<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon — SNG SVG logo -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Viewport — prevent iOS auto font-size inflation -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#D32F2F" />

    <!-- Primary SEO -->
    <title>SNG Jewellers — Luxury Jewellery Since 1995 | Regal Heritage</title>
    <meta name="description" content="SNG Jewellers — purveyors of extraordinary jewellery since 1995. Discover our bridal collections, high jewellery, bespoke services and flagship destinations in London, New York and Mumbai." />
    <meta name="keywords" content="SNG Jewellers, luxury jewellery, bridal jewellery, gold jewellery, diamond jewellery, bespoke jewellery, Indian jewellery, emerald collection, heritage jewellery" />
    <meta name="author" content="SNG Jewellers" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SNG Jewellers" />
    <meta property="og:title" content="SNG Jewellers — Luxury Jewellery Since 1995" />
    <meta property="og:description" content="Purveyors of extraordinary jewellery since 1995. Bridal collections, high jewellery and bespoke concierge services." />
    <meta property="og:image" content="/favicon.svg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SNG Jewellers — Luxury Jewellery Since 1995" />
    <meta name="twitter:description" content="Purveyors of extraordinary jewellery since 1995. Bridal collections, high jewellery and bespoke concierge services." />

    <!-- Lock base font size so rem values are pixel-consistent across all browsers -->
    <style>
      html { font-size: 16px; }
      @font-face { font-family: 'Playfair Display'; font-display: swap; }
      @font-face { font-family: 'Source Sans 3';    font-display: swap; }
      @font-face { font-family: 'Montserrat';       font-display: swap; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
